name: DevSecOps Pipeline

on:
  push:
    branches: [main, develop]

jobs:
  build-scan-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 🔐 SECURITY GATE 1: Snyk (Dependencies)
      - name: Snyk Scan
        uses: snyk/actions/node@master
        continue-on-error: true 
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --all-projects --severity-threshold=critical
          command: test

      # 🐳 BUILD IMAGE
      - name: Build Docker Image
        run: |
          docker build \
          -t ${{ secrets.DOCKER_USERNAME }}/ghost-app:latest \
          -f Dockerfile.production .

      # 🔍 SECURITY GATE 2: Trivy (Container OS)
      - name: Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ secrets.DOCKER_USERNAME }}/ghost-app:latest'
          format: 'table'
          severity: 'CRITICAL,HIGH'

      # 📦 PUSH TO DOCKER HUB
      - name: Docker Login & Push
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
          docker push ${{ secrets.DOCKER_USERNAME }}/ghost-app:latest

      # 🚀 FINAL STATUS
      - name: Deployment Success
        run: echo "DevSecOps Pipeline complete for branch ${{ github.ref_name }}"
