name: DevSecOps Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-scan-deploy:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install pnpm
      run: npm install -g pnpm

    - name: Install Dependencies
      run: pnpm install

    # 🔐 SNYK SCAN
    - name: Snyk Scan
      uses: snyk/actions/node@master
      continue-on-error: true
      env:
        SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      with:
        command: test

    # 🔨 BUILD APPLICATION (IMPORTANT FIX)
    - name: Build Application
      run: pnpm build

    # 🐳 DOCKER LOGIN
    - name: Docker Login
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # 🐳 BUILD IMAGE
    - name: Build Docker Image
      run: |
        docker build \
        -t ${{ secrets.DOCKER_USERNAME }}/ghost-app:latest \
        -f Dockerfile.production .

    # 🔍 TRIVY SCAN (FILESYSTEM)
    - name: Trivy Scan (Filesystem)
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        format: 'table'
        exit-code: '0'

    # 📦 PUSH IMAGE
    - name: Push Docker Image
      run: |
        docker push ${{ secrets.DOCKER_USERNAME }}/ghost-app:latest

    # ✅ SLACK SUCCESS NOTIFICATION
    - name: Slack Notification (Success)
      if: success()
      run: |
        curl -X POST -H 'Content-type: application/json' \
        --data '{"text":"✅ DevSecOps Pipeline Passed 🚀"}' \
        ${{ secrets.SLACK_WEBHOOK }}

    # ❌ SLACK FAILURE NOTIFICATION
    - name: Slack Notification (Failure)
      if: failure()
      run: |
        curl -X POST -H 'Content-type: application/json' \
        --data '{"text":"❌ DevSecOps Pipeline Failed ❗"}' \
        ${{ secrets.SLACK_WEBHOOK }}
