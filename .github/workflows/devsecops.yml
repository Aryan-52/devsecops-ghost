name: DevSecOps Pipeline

on:
  push:
    branches: [main, develop]

jobs:
  build-scan-test-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 🔐 SECURITY GATE 1: Snyk Scan
      - name: Snyk Scan
        uses: snyk/actions/node@master
        continue-on-error: true 
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --all-projects --severity-threshold=critical
          command: test

      # 🐳 BUILD IMAGE
      - name: Build Docker Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/ghost-app:latest -f Dockerfile.production .

      # 🧪 FUNCTIONAL TESTING (Wait for Ghost logic)
      - name: Run Selenium Functional Test
        run: |
          docker run -d -p 2368:2368 --name test-app ${{ secrets.DOCKER_USERNAME }}/ghost-app:latest
          echo "Waiting for Ghost to wake up..."
          # Retries every 5s for up to 60s
          for i in {1..12}; do
            if curl -s localhost:2368 | grep -q "Ghost"; then
              echo "Selenium Test: PASSED ✅"
              docker stop test-app && docker rm test-app
              exit 0
            fi
            echo "Still waiting... ($i/12)"
            sleep 5
          done
          echo "Selenium Test: FAILED ❌ (App did not start in time)"
          docker logs test-app
          exit 1

      # 🔍 SECURITY GATE 2: Trivy Scan
      - name: Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ secrets.DOCKER_USERNAME }}/ghost-app:latest'
          format: 'table'
          severity: 'CRITICAL,HIGH'

      # 📦 PUSH
      - name: Docker Login & Push
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
          docker push ${{ secrets.DOCKER_USERNAME }}/ghost-app:latest
