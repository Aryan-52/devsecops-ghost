name: DevSecOps Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-scan-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install pnpm
      run: npm install -g pnpm

    - name: Install Dependencies
      run: pnpm install

    # 🔐 SNYK SCAN
    - name: Snyk Scan
      uses: snyk/actions/node@master
      continue-on-error: true
      env:
        SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      with:
        command: test

    # 🔨 BUILD ADMIN (FIX)
    - name: Build Ghost Admin
      run: |
        cd ghost/admin
        pnpm install
        pnpm build

    # 🐳 DOCKER LOGIN
    - name: Docker Login
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # 🐳 BUILD IMAGE
    - name: Build Docker Image
      run: |
        docker build \
        -t ${{ secrets.DOCKER_USERNAME }}/ghost-app:latest \
        -f Dockerfile.production .

    # 🔍 TRIVY SCAN
    - name: Trivy Scan
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: '${{ secrets.DOCKER_USERNAME }}/ghost-app:latest'
        format: 'table'
        exit-code: '0'

    # 📦 PUSH IMAGE
    - name: Push Docker Image
      run: docker push ${{ secrets.DOCKER_USERNAME }}/ghost-app:latest

    # ✅ SLACK SUCCESS
    - name: Slack Success
      if: success()
      run: |
        curl -X POST -H 'Content-type: application/json' \
        --data '{"text":"DevSecOps Pipeline SUCCESS"}' \
        ${{ secrets.SLACK_WEBHOOK }}

    # ❌ SLACK FAILURE
    - name: Slack Failure
      if: failure()
      run: |
        curl -X POST -H 'Content-type: application/json' \
        --data '{"text":"DevSecOps Pipeline FAILED"}' \
        ${{ secrets.SLACK_WEBHOOK }}
