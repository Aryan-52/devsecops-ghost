name: DevSecOps Pipeline

on:
  push:
    branches:
      - main
      - develop

jobs:
  build-scan-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 🔐 SNYK SCAN (Dependency Security)
      - name: Snyk Scan
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: test # Pipeline STOPS here if vulnerabilities exist

      # 🐳 DOCKER LOGIN
      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 🐳 BUILD IMAGE
      - name: Build Docker Image
        run: |
          docker build \
          -t ${{ secrets.DOCKER_USERNAME }}/ghost-app:latest \
          -f Dockerfile.production .

      # 🔍 TRIVY SCAN (Image Security)
      - name: Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ secrets.DOCKER_USERNAME }}/ghost-app:latest'
          format: 'table'
          exit-code: '1' # Fails the build if vulnerabilities are found
          severity: 'CRITICAL,HIGH'

      # 📦 PUSH IMAGE
      - name: Push Docker Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/ghost-app:latest

      # 🚀 DEPLOYMENT STATUS
      - name: Deployment Success
        run: |
          echo "Security Gates Passed. Image pushed to DockerHub."
          echo "Infrastructure is managed via Terraform locally."
