name: DevSecOps Pipeline

on:
  push:
    branches:
      - main
      - [cite_start]develop  # Meets GitFlow requirements [cite: 17, 153]

jobs:
  build-scan-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 🔐 SNYK SCAN (Dependency Security)
      - name: Snyk Scan
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          [cite_start]command: test # Blocks deployment if high-risk bugs are found [cite: 67, 204]

      # 🐳 DOCKER LOGIN
      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 🐳 BUILD IMAGE
      - name: Build Docker Image
        run: |
          docker build \
          -t ${{ secrets.DOCKER_USERNAME }}/ghost-app:latest \
          -f Dockerfile.production .

      # 🔍 TRIVY SCAN (Image Security)
      - name: Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ secrets.DOCKER_USERNAME }}/ghost-app:latest'
          format: 'table'
          [cite_start]exit-code: '1' # Mandatory: Fails pipeline on High/Critical risks [cite: 68, 204]
          severity: 'CRITICAL,HIGH'

      # 📦 PUSH IMAGE
      - name: Push Docker Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/ghost-app:latest

      # 🚀 DEPLOYMENT NOTIFICATION
      - name: Deployment Status
        run: |
          echo "Vulnerability scans passed. Ghost image is secure."
          echo "Triggering Kubernetes Rolling Update via Terraform..."
