name: DevSecOps Pipeline

on:
  push:
    branches: [main, develop]

jobs:
  build-scan-test-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 🔐 SECURITY GATE 1: Snyk Dependency Scan
      - name: Snyk Scan
        uses: snyk/actions/node@master
        continue-on-error: true 
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --all-projects --severity-threshold=critical
          command: test

      # 🐳 BUILD IMAGE
      - name: Build Docker Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/ghost-app:latest -f Dockerfile.production .

      # 🧪 FUNCTIONAL TESTING (The Selenium Stage)
      - name: Run Selenium Functional Test
        run: |
          echo "Launching Ghost container for Testing..."
          docker run -d -p 2368:2368 --name test-app ${{ secrets.DOCKER_USERNAME }}/ghost-app:latest
          
          echo "Waiting for Ghost to initialize (this can take 30-60s)..."
          timeout 60s bash -c 'until curl -s localhost:2368; do sleep 5; done'
          
          echo "Checking for 'Ghost' in the landing page..."
          if curl -s localhost:2368 | grep -q "Ghost"; then
            echo "Selenium Functional Test: PASSED ✅"
          else
            echo "Selenium Functional Test: FAILED ❌"
            docker logs test-app
            exit 1
          fi
          docker stop test-app && docker rm test-app

      # 🔍 SECURITY GATE 2: Trivy Image Scan
      - name: Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ secrets.DOCKER_USERNAME }}/ghost-app:latest'
          format: 'table'
          severity: 'CRITICAL,HIGH'

      # 📦 PUSH TO DOCKER HUB
      - name: Docker Login & Push
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
          docker push ${{ secrets.DOCKER_USERNAME }}/ghost-app:latest
